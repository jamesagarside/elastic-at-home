name: Render Architecture Diagram

on:
  push:
    paths:
      - ".github/workflows/render-architecture.yml"
      - "scripts/render-architecture.py"
      - "images/icons/**"
    branches:
      - main
      - development
  pull_request:
    paths:
      - "scripts/render-architecture.py"
      - "images/icons/**"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Render architecture SVG
        run: |
          mkdir -p images/architecture
          python3 scripts/render-architecture.py > images/architecture/architecture.svg

      - name: Rasterise to PNG (1800px wide)
        run: |
          rsvg-convert -w 1800 images/architecture/architecture.svg \
            -o images/architecture/architecture.png
          file images/architecture/architecture.png

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagram
          path: images/architecture/architecture.*

      - name: Check for meaningful changes
        id: diff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Only compare the SVG — PNG bytes can drift between runner images
          # (libpng/librsvg updates) even when the diagram is visually identical,
          # which would otherwise trigger an unwanted follow-up PR on every run.
          if git diff --quiet -- images/architecture/architecture.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "SVG unchanged — skipping PR creation"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "SVG changed — will open follow-up PR"
            git diff --stat -- images/architecture/
          fi

      - name: Open PR with updated diagrams
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update architecture diagram"
          title: "docs: update architecture diagram"
          body: |
            Automated regeneration of `images/architecture/architecture.{svg,png}`
            after changes to `scripts/render-architecture.py` or `images/icons/**`
            were merged into `main`.

            Triggered by workflow run ${{ github.run_id }}.
          branch: automation/update-architecture-diagram
          delete-branch: true
          add-paths: images/architecture/*
          labels: documentation, automation
