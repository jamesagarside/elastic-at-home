title: Elastic at Home - Self-Hosted SIEM & XDR for Your Home Network
description: >-
  Deploy a production-grade, self-hosted SIEM and XDR platform at home using
  the Elastic Stack, Docker Compose, and a Raspberry Pi (or any Linux host).
  Free, open-source home security monitoring with endpoint protection,
  threat intelligence, ML anomaly detection, and an optional local LLM.
url: https://jamesagarside.github.io
baseurl: /elastic-at-home
author:
  name: James Garside
  url: https://github.com/jamesagarside

# SEO & social
lang: en-GB
logo: /images/icons/elastic.png
image: /images/architecture/architecture.png
twitter:
  card: summary_large_image
social:
  name: James Garside
  links:
    - https://github.com/jamesagarside/elastic-at-home

# Google Search Console verification (emitted by jekyll-seo-tag as <meta name="google-site-verification">)
google_site_verification: s0fUxvlg3eomM9jADqykITUbV8B-os9zofPhvYKfNk8

# Keywords: surfaced by jekyll-seo-tag in <meta> and JSON-LD
keywords: >-
  home SIEM, self-hosted SIEM, Elastic Stack Docker Compose,
  Raspberry Pi SIEM, home network monitoring, Elastic Security home lab,
  XDR home network, open-source SIEM, endpoint detection and response,
  home security operations centre, Elastic Agent Fleet,
  Elasticsearch Kibana self-hosted, local LLM Elasticsearch,
  Ollama Gemma Elastic

remote_theme: pages-themes/minimal@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - docker-compose*.yaml
  - docker-compose*.yml
  - configurations
  - scripts
  - .env.example
  - Gemfile
  - Gemfile.lock
  - openspec
  - CLAUDE.md
